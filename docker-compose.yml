services:
  downloader:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

    # ── Volumes persistentes ──────────────────────────────────────────────────
    volumes:
      # cookies.txt gerado pelo update_cookies.sh no host
      - ./cookies.txt:/app/cookies.txt:ro
      # downloads temporários (evita encher a raiz do container)
      - yt_tmp:/tmp/yt_downloader

    # ── Variáveis de ambiente ─────────────────────────────────────────────────
    # Copie .env.example → .env e preencha os valores reais
    env_file:
      - .env

    environment:
      - PYTHONPATH=/app
      - RATE_LIMIT_REDIS_URL=${RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}

    # ── Reinício automático ───────────────────────────────────────────────────
    restart: unless-stopped

    # ── Healthcheck ───────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # ── Recursos (ajuste conforme o host) ─────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  yt_tmp:
  redis_data:
